title: Exchange Server End of Support
description: >-
  Comprehensive guide for IT administrators and decision-makers preparing for
  Exchange Server end of support — covering migration options, checklists,
  TCO analysis, risks, and licensing.

remote_theme: just-the-docs/just-the-docs

url: "https://DekBaCom.github.io"
baseurl: "/Exchange-Server-End-of-Support"

color_scheme: exchange
search_enabled: true

search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

nav_sort: order
heading_anchors: true

aux_links:
  "View on GitHub":
    - "//github.com/DekBaCom/Exchange-Server-End-of-Support"
aux_links_new_tab: true

footer_content: >-
  Exchange Server End of Support Guide &copy; 2025&ndash;2026.
  Built with <a href="https://just-the-docs.com">Just the Docs</a>.

back_to_top: true
back_to_top_text: "Back to top"

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
